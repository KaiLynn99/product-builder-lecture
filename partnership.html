<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의</title>
    <meta name="description" content="사이트 제휴, 협업, 광고 문의를 보낼 수 있는 공식 문의 페이지입니다.">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1248878012677712"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="site-nav" aria-label="Primary navigation">
            <a href="index.html">Lotto</a>
            <a href="animal.html">동물상 테스트</a>
            <a href="animal-guide.html">이용 가이드</a>
            <a href="partnership.html" aria-current="page">제휴 문의</a>
            <a href="about.html">소개</a>
            <a href="privacy.html">개인정보</a>
        </nav>
        <h1>제휴 문의</h1>
        <button id="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false">
            Dark Mode
        </button>
    </header>
    <main>
        <section class="contact-panel" aria-labelledby="partnership-title">
            <h2 id="partnership-title">함께할 제안을 보내주세요</h2>
            <p>협업, 광고, 공동 프로모션 등 필요한 내용을 남겨주시면 확인 후 연락드리겠습니다.</p>
            <form action="https://formspree.io/f/mbdqdlqe" method="POST">
                <input type="hidden" name="_subject" value="새 제휴 문의가 도착했습니다">

                <label for="name">이름</label>
                <input id="name" name="name" type="text" autocomplete="name" required>

                <label for="email">이메일</label>
                <input id="email" name="email" type="email" autocomplete="email" required>

                <label for="company">회사/브랜드</label>
                <input id="company" name="company" type="text" autocomplete="organization">

                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">문의 보내기</button>
            </form>
        </section>

        <section class="comments-panel" aria-labelledby="partnership-comments-title" data-comments-key="partnership-comments">
            <h2 id="partnership-comments-title">댓글</h2>
            <form class="comment-form comment-form--collapsed">
                <label for="partnership-comment-name">이름</label>
                <input id="partnership-comment-name" name="name" type="text" autocomplete="name" required>

                <label for="partnership-comment-message">내용</label>
                <textarea id="partnership-comment-message" name="message" rows="1" placeholder="댓글 추가..." required></textarea>

                <div class="emoji-picker" aria-label="댓글 이모티콘">
                    <button type="button" data-emoji="😀" aria-label="웃는 얼굴 추가">😀</button>
                    <button type="button" data-emoji="🎉" aria-label="축하 이모티콘 추가">🎉</button>
                    <button type="button" data-emoji="👍" aria-label="좋아요 이모티콘 추가">👍</button>
                    <button type="button" data-emoji="🍀" aria-label="행운 이모티콘 추가">🍀</button>
                    <button type="button" data-emoji="🔥" aria-label="불꽃 이모티콘 추가">🔥</button>
                    <button type="button" data-emoji="✨" aria-label="반짝임 이모티콘 추가">✨</button>
                    <button type="button" data-emoji="💡" aria-label="아이디어 이모티콘 추가">💡</button>
                    <button type="button" data-emoji="🙏" aria-label="감사 이모티콘 추가">🙏</button>
                </div>

                <button type="submit">댓글 남기기</button>
            </form>
            <div class="comment-list" aria-live="polite"></div>
        </section>
    </main>

    <footer class="site-footer">
        <nav aria-label="Footer navigation">
            <a href="animal-guide.html">동물상 테스트 이용 가이드</a>
            <a href="about.html">사이트 소개</a>
            <a href="privacy.html">개인정보 처리방침</a>
            <a href="partnership.html">제휴 문의</a>
        </nav>
        <p>사진 분석 결과는 재미와 참고용이며, 실제 성격이나 외모를 단정하지 않습니다.</p>
    </footer>
    <script src="main.js" defer></script>
</body>
</html>
