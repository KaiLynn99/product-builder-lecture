<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Lotto Number Generator</h1>
        <button id="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false">
            Dark Mode
        </button>
    </header>
    <main>
        <div class="number-container">
            <!-- Numbers will be generated here -->
        </div>
        <button id="generate-btn">Generate Numbers</button>
    </main>
    <script src="main.js"></script>
</body>
</html>
