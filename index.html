<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="site-nav" aria-label="Primary navigation">
            <a href="index.html" aria-current="page">Lotto</a>
            <a href="partnership.html">제휴 문의</a>
        </nav>
        <h1>Lotto Number Generator</h1>
        <button id="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false">
            Dark Mode
        </button>
    </header>
    <main>
        <section class="lotto-panel" aria-labelledby="lotto-title">
            <h2 id="lotto-title">Your Lucky Numbers</h2>
            <div class="number-container" aria-live="polite">
                <!-- Numbers will be generated here -->
            </div>
            <button id="generate-btn" type="button">Generate Numbers</button>
        </section>

        <section class="comments-panel" aria-labelledby="lotto-comments-title" data-comments-key="lotto-comments">
            <h2 id="lotto-comments-title">댓글</h2>
            <form class="comment-form">
                <label for="lotto-comment-name">이름</label>
                <input id="lotto-comment-name" name="name" type="text" autocomplete="name" required>

                <label for="lotto-comment-message">댓글</label>
                <textarea id="lotto-comment-message" name="message" rows="3" required></textarea>

                <button type="submit">댓글 남기기</button>
            </form>
            <div class="comment-list" aria-live="polite"></div>
        </section>
    </main>
    <script src="main.js" defer></script>
</body>
</html>
