<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="site-nav" aria-label="Primary navigation">
            <a href="index.html" aria-current="page">Lotto</a>
            <a href="partnership.html">제휴 문의</a>
        </nav>
        <h1>Lotto Number Generator</h1>
        <button id="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false">
            Dark Mode
        </button>
    </header>
    <main>
        <section class="lotto-panel" aria-labelledby="lotto-title">
            <h2 id="lotto-title">Your Lucky Numbers</h2>
            <div class="number-container" aria-live="polite">
                <!-- Numbers will be generated here -->
            </div>
            <button id="generate-btn" type="button">Generate Numbers</button>
        </section>
    </main>
    <script src="main.js" defer></script>
</body>
</html>
